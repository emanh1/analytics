name: Build dist

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit dist
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist
          git diff --cached --quiet || git commit -m "Update dist"
          git push